<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="resources/styles/selectorGame.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Selector Juego</title>
</head>
<body class="">
    <div class="header">
        <div class="previous-index">

            <a href="index.html"><i class="fas fa-arrow-left"></i></a>
        </div>
        <div class="version-data">

            <span>Alpha 1.0</span>
        </div>
    </div>
    <div class="content">
        <div class="title">
            <h1 id="title_page">POKEMON LIBRARY</h1>
        </div>
        <div class="info_page">
            <span>Seleccione el tipo de mundo al que deseas ingresar</span>
        </div>
        <div class="card-content">
            <div class="red-flames" id="btn-rojo">
                <div class="title-card">
                    <span>Edición Rojo Fuego</span>
                </div>
                <div class="img-card">

                    <img src="resources/images/cards/rojoFuego.png" alt="">
                </div>
            </div>
            <div class="green-leaf" id="btn-verde">
                <div class="title-card">
                    <span>Edición Verde Hoja</span>
                </div>
                <div class="img-card">

                    <img src="resources/images/cards/verdeHoja.png" alt="">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
<script src="resources/js/selectorGame.js"></script>
